name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-library-discovery
  APP_NAME: libdiscovery
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: DEV
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      # -----------------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Azure login
      # -----------------------------------------------------------------------
      - name: Azure Login
        run: |
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      # -----------------------------------------------------------------------
      # Register resource providers (safe to re-run)
      # -----------------------------------------------------------------------
      - name: Register resource providers
        run: |
          az provider register --namespace Microsoft.App --wait
          az provider register --namespace Microsoft.OperationalInsights --wait
          az provider register --namespace Microsoft.Web --wait

      # -----------------------------------------------------------------------
      # Build & push Docker image to ghcr.io
      # -----------------------------------------------------------------------
      - name: Set image name
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${{ env.REGISTRY }}/${OWNER}/library-discovery-api:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.name }}

      # -----------------------------------------------------------------------
      # Create resource group
      # -----------------------------------------------------------------------
      - name: Create resource group
        run: |
          az group create \
            --name "${{ env.RESOURCE_GROUP }}" \
            --location "eastus"

      # -----------------------------------------------------------------------
      # Deploy infrastructure — pass 1 (CORS = *)
      # -----------------------------------------------------------------------
      - name: Deploy infrastructure (pass 1)
        id: infra1
        run: |
          OUTPUTS=$(az deployment group create \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters @infra/main.parameters.json \
            --parameters geminiApiKey="${{ secrets.GEMINI_API_KEY }}" \
            --parameters containerImage="${{ steps.image.outputs.name }}" \
            --parameters registryUsername="${{ github.repository_owner }}" \
            --parameters registryPassword="${{ secrets.GHCR_TOKEN }}" \
            --query "properties.outputs" -o json)

          SWA_URL=$(echo "$OUTPUTS" | jq -r '.staticWebAppUrl.value')
          API_URL=$(echo "$OUTPUTS" | jq -r '.apiUrl.value')
          SWA_HOST=$(echo "$OUTPUTS" | jq -r '.staticWebAppHostname.value')

          echo "swa_url=$SWA_URL"   >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL"   >> "$GITHUB_OUTPUT"
          echo "swa_host=$SWA_HOST" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Deploy infrastructure — pass 2 (set CORS to actual SWA URL)
      # -----------------------------------------------------------------------
      - name: Deploy infrastructure (pass 2 — set CORS)
        run: |
          az deployment group create \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters @infra/main.parameters.json \
            --parameters geminiApiKey="${{ secrets.GEMINI_API_KEY }}" \
            --parameters containerImage="${{ steps.image.outputs.name }}" \
            --parameters registryUsername="${{ github.repository_owner }}" \
            --parameters registryPassword="${{ secrets.GHCR_TOKEN }}" \
            --parameters allowedOrigin="${{ steps.infra1.outputs.swa_url }}"

      # -----------------------------------------------------------------------
      # Build & deploy React frontend
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: ${{ steps.infra1.outputs.api_url }}/api

      - name: Get SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ env.APP_NAME }}-frontend" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true
